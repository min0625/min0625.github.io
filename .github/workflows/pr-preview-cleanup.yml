on:
  delete:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch name to clean preview deployments for (optional for delete event)'
        required: false
        default: ''

permissions:
  contents: read
  deployments: write

jobs:
  clean:
    runs-on: ubuntu-latest
    name: Clean up deployments
    steps:
      - uses: actions/checkout@v5

      - name: Clean up Cloudflare Pages preview deployments
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_TYPE: ${{ github.event.ref_type }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          MANUAL_BRANCH: ${{ github.event.inputs.branch }}
        run: |
          bash .ci/clean-cloudflare-pages-previews.sh
