name: Cloudflare Pages Cleanup

on:
  delete: {}
  workflow_dispatch:
    inputs:
      branch:
        description: Branch name to clean up Cloudflare Pages deployments for
        required: true
        type: string

jobs:
  cleanup:
    name: Delete Cloudflare Pages deployments
    runs-on: ubuntu-latest
    if:
      github.event_name == 'workflow_dispatch' || (github.event_name ==
      'delete' && github.event.ref_type == 'branch')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Delete deployments for deleted or selected branch
        env:
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_PROJECT: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
          INPUT_BRANCH: ${{ inputs.branch }}
        run: python3 .github/scripts/cloudflare_pages_cleanup.py
