name: PR Check

on:
  pull_request:
    branches:
      - main

jobs:
  check:
    name: bun check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run check
        run: bun run check
